services:
    db:
        image: postgres:18-alpine
        container_name: fintrack_db
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
            POSTGRES_DB: ${DB_NAME:-fintrack}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - fintrack

    migrator:
        image: migrate/migrate:v4.19.1
        container_name: fintrack_migrator
        volumes:
            - ./migrations:/migrations
        command:
            [
                "-path",
                "/migrations/",
                "-database",
                "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-fintrack}?sslmode=disable",
                "up",
            ]
        depends_on:
            db:
                condition: service_healthy
        networks:
            - fintrack

volumes:
    postgres_data:

networks:
    fintrack:
